<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>中国語単語学習クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>中国語単語学習ゲーム</h2>
<button onclick="location.href='wordlist.html'">単語一覧へ</button>

<div class="control">
  <label>単語リスト：</label>
  <select id="listSelect">
    <option value="hsk3_1_001_250.json">HSK3.0-1級(1~250)</option>
    <option value="hsk3_1_251_500.json">HSK3.0-1級(251~500)</option>
    <option value="hsk3_2_001_250.json">HSK3.0-2級(1~250)</option>
    <option value="hsk3_2_251_500.json">HSK3.0-2級(251~500)</option>
    <option value="hsk3_2_501_772.json">HSK3.0-2級(501~772)</option>
  </select>
</div>

<div class="control">
  <label>出題範囲：</label>
  <label>
  <input type="checkbox" id="weakOnlyQuiz">
  苦手単語のみで出題
  </label>
  <select id="rangeSelect"></select>
  <button id="startBtn">開始</button>
</div>

<hr>

<div id="game" class="hidden">
  <h3 id="hanzi" class="chinese"></h3>

  <p id="progress"></p>
  
  <div id="choices"></div>

  <p id="result"></p>
  <p id="pinyin"></p>

  <button id="nextBtn">次の問題へ</button>
</div>

 <div id="score" class="hidden">
  <h3>結果</h3>
  <p id="scoreText"></p>
  <button id="retryWrongBtn">不正解のみ復習</button>
</div>

<script src="app.js"></script>
</body>
</html>
