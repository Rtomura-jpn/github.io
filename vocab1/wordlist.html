<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>単語一覧｜中国語単語学習</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>中国語単語一覧（HSK3.0）</h2>
<button onclick="location.href='index.html'">単語クイズへ</button>

<div class="control">
  <label>単語リスト：</label>
  <select id="listSelect">
    <option value="hsk3_1_001_250.json">HSK3.0-1級(1~250)</option>
    <option value="hsk3_1_251_500.json">HSK3.0-1級(251~500)</option>
    <option value="hsk3_2_001_250.json">HSK3.0-2級(1~250)</option>
    <option value="hsk3_2_251_500.json">HSK3.0-2級(251~500)</option>
    <option value="hsk3_2_501_772.json">HSK3.0-2級(501~772)</option>
  </select>

  <label>表示範囲：</label>
  <select id="rangeSelect"></select>

  <label>
    <input type="checkbox" id="onlyWeak">
    苦手単語のみ表示
  </label>

  <button id="filterBtn">表示</button>
</div>

<hr>

<table id="wordTable">
  <thead>
    <tr>
      <th>No</th>
      <th>漢字</th>
      <th>拼音</th>
      <th>日本語</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="wordlist.js"></script>
</body>
</html>
