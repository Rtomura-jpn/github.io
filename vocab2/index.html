<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Lessons</title>
    <script>
        async function loadVocabulary(group) {
            const response = await fetch(`data/${group}.json`);
            const data = await response.json();
            const lessonTabs = document.getElementById('lesson-tabs');
            lessonTabs.innerHTML = '';
            data.forEach(item => {
                const tab = document.createElement('div');
                tab.className = 'lesson-tab';
                tab.innerHTML = `<h3>${item.hanzi} - ${item.pinyin}</h3><p>${item.ja}</p><p>${item.juzi_ja}</p><p>${item.juzi_ch}</p>`;
                lessonTabs.appendChild(tab);
            });
        }

        function handleGroupChange(event) {
            const selectedGroup = event.target.value;
            loadVocabulary(selectedGroup);
        }
    </script>
</head>
<body>
    <div>
        <label for="group-selector">Select a Group:</label>
        <select id="group-selector" onchange="handleGroupChange(event)">
            <option value="group1">Group 1</option>
            <option value="group2">Group 2</option>
            <option value="group3">Group 3</option>
        </select>
    </div>
    <div id="lesson-tabs"></div>
</body>
</html>
